# krateo-loadbalancer.yaml - Krateo Platform Configuration for LoadBalancer
# Declarative steps-based workflow for platform provisioning with LoadBalancer service exposure.
# Steps execute sequentially in order, enabling natural dependency ordering.
# NOTE: Use this configuration for cloud platforms (GCP, AWS, Azure) where LoadBalancer IPs are available.

# ============================================================================
# Component Definitions
# Maps logical components to their implementation steps.
# Use these names in krateo-overrides.yaml for component-level configuration.
# ============================================================================
componentsDefinition:
  backend:
    description: "Core backend services (LoadBalancer-exposed)"
    steps:
      - install-authn
      - extract-authn-lb-ip
      - extract-authn-lb-port
      - install-snowplow
      - extract-snowplow-lb-ip
      - extract-snowplow-lb-port
  
  cnpg:
    description: "CloudNativePG operator, PostgreSQL cluster, and database"
    steps:
      - install-cnpg
      - install-pg-cluster
  
  db-maintenance:
    description: "Database preparation and maintenance tasks like partitioning and vacuuming"
    steps:
      - install-deviser

  resources-stack:
    description: "Dedicated APIs for resources"
    steps:
      - install-resources-ingester
      - install-resources-presenter

  events-stack:
    description: "Event streaming and storage stack"
    steps:
      - install-events-ingester
      - install-events-presenter
      - extract-events-presenter-lb-ip
      - extract-events-presenter-lb-port

  frontend:
    description: "Web UI and platform dashboard (LoadBalancer-exposed)"
    steps:
      - install-frontend

  portal-defaults:
    description: "Portal starter template"
    steps:
      - install-portal

  composable-operations:
    description: "Core composition and orchestration engine"
    steps:
      - install-core-provider

  operator-generator:
    description: "OpenAPI schema generation provider"
    steps:
      - install-oasgen-provider

  finops:
    description: "Cost management and FinOps analytics (optional) and OPA Gatekeeper for policy enforcement (optional)"
    steps:
      - install-finops-cratedb
      - install-finops-operator-exporter
      - install-finops-operator-focus
      - install-finops-database-handler
      - extract-finops-database-handler-port
      - install-finops-database-handler-uploader
      - install-finops-notebooks
      - install-finops-operator-scraper
      - install-opa

# ============================================================================
# Provisioning Steps (executed in order)
# Each step represents an operation: creating secrets, installing charts, etc.
# Edit krateo-overrides.yaml to customize component behavior without modifying this file.
# ============================================================================

steps:
  # Core authentication service
  - id: install-authn
    type: chart
    with:
      repo: authn
      url: https://charts.krateo.io
      version: 0.22.2
      wait: true
      timeout: 15m
      values:
        image:
          repository: ghcr.io/krateoplatformops/authn
          pullPolicy: IfNotPresent
        service:
          type: LoadBalancer
        env:
          AUTHN_KUBECONFIG_SERVER_URL: null

  # Extract authn LoadBalancer IP for downstream use
  - id: extract-authn-lb-ip
    type: var
    with:
      name: AUTHN_IP
      valueFrom:
        apiVersion: v1
        kind: Service
        metadata:
          name: authn
          namespace: {{ .Namespace }}
        selector: .status.loadBalancer.ingress[0].ip

  # Extract authn service port for downstream use
  - id: extract-authn-lb-port
    type: var
    with:
      name: AUTHN_PORT
      valueFrom:
        apiVersion: v1
        kind: Service
        metadata:
          name: authn
          namespace: {{ .Namespace }}
        selector: .spec.ports[0].port

  # Event tracking service 
  - id: install-snowplow
    type: chart
    with:
      repo: snowplow
      url: https://charts.krateo.io
      version: 0.20.6
      wait: true
      timeout: 15m
      values:
        image:
          repository: ghcr.io/krateoplatformops/snowplow
          pullPolicy: IfNotPresent
        service:
          type: LoadBalancer

  # Extract snowplow LoadBalancer IP
  - id: extract-snowplow-lb-ip
    type: var
    with:
      name: SNOWPLOW_IP
      valueFrom:
        apiVersion: v1
        kind: Service
        metadata:
          name: snowplow
          namespace: {{ .Namespace }}
        selector: .status.loadBalancer.ingress[0].ip

  # Extract snowplow port
  - id: extract-snowplow-lb-port
    type: var
    with:
      name: SNOWPLOW_PORT
      valueFrom:
        apiVersion: v1
        kind: Service
        metadata:
          name: snowplow
          namespace: {{ .Namespace }}
        selector: .spec.ports[0].port

  - id: install-cnpg
    type: chart
    with:
      releaseName: cnpg
      repo: cloudnative-pg
      url: https://cloudnative-pg.github.io/charts
      version: 0.27.1
      wait: true
      timeout: 15m
      # default values for the CNPG operator

  - id: install-pg-cluster # CNPG Cluster + database `krateo-db`
    type: chart
    with:
      releaseName: pg-cluster
      repo: cluster
      url: https://cloudnative-pg.github.io/charts
      version: 0.5.0
      wait: true
      timeout: 15m
      values:
        # fullnameOverride controls the name of every K8s resource produced.
        fullnameOverride: "pg-cluster"
        namespaceOverride: ""            # Defaults to the Helm release namespace

        # Engine type & version
        type: postgresql
        version:
          postgresql: "18"              # PostgreSQL major version

        # Cluster mode
        mode: standalone

        cluster:
          # 3 instances = 1 primary (read-write) + 2 standbys (read-only)
          # CNPG exposes three services automatically:
          #   <name>-rw  → primary only   (writes + reads)
          #   <name>-ro  → standbys only  (reads only)
          #   <name>-r   → all instances  (reads)
          instances: 3

          storage:
            size: 10Gi

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # Declarative role management
          roles:
            - name: krateo-db-user
              comment: "Owner of the krateo-db database"
              login: true
              passwordSecret:
                name: krateo-db-user  # Kubernetes Secret with username and password for the owner role, it must exist before CNPG cluster creation

        # Monitoring configuration
        #  monitoring:
        #    # Enable monitoring with Prometheus
        #    enabled: true # If true, it will create the PrometheusRule
        #    podMonitor:
        #      enabled: false # Explicitely set to false since it is deprecated in favor of manually creating a PodMonitor

        # Declarative database management via the CNPG "Database" CRD.
        # Each entry below produces a separate Database object in Kubernetes.
        databases:
          # Database 1: krateo-db
          # Purpose: stores resources and k8s events
          - name: krateo-db
            owner: krateo-db-user         # Must match a role in cluster.roles above

  - id: install-deviser
    type: chart
    with:
      releaseName: deviser
      repo: deviser
      url: https://charts.krateo.io
      version: 0.5.0
      wait: true
      timeout: 15m
      values:
        config:
          DEBUG: "true"
          PORT: "8081"

          DB_HOST: pg-cluster-rw.{{ .Namespace }}.svc.cluster.local
          DB_NAME: krateo-db
          DB_READY_TIMEOUT: "5m"

          PM_MAX_PARTITIONS_SIZE: "1073741824" # 1GB
          PM_TRIGGER_RATIO: "0.75"
          PM_TARGET_RATIO: "0.60"
          PM_RETENTION_DAYS: "2"
        
        secret:
          name: krateo-db

  - id: install-resources-ingester
    type: chart
    with:
      releaseName: resources-ingester
      repo: resources-ingester
      url: https://charts.krateo.io
      version: 1.0.3
      values:
        config:
          DEBUG: "true"
          PORT: "8084"

          DB_HOST: pg-cluster-rw.{{ .Namespace }}.svc.cluster.local
          DB_NAME: krateo-db
          DB_READY_TIMEOUT: "5m"

        secret:
          name: krateo-db
        
  - id: install-resources-presenter
    type: chart
    with:
      releaseName: resources-presenter
      repo: resources-presenter
      url: https://charts.krateo.io
      version: 0.9.0
      wait: true
      timeout: 15m
      values:
        service:
          type: LoadBalancer
          port: 8083
        config:
          DEBUG: "true"
          PORT: "8085"

          DB_HOST: pg-cluster-ro.{{ .Namespace }}.svc.cluster.local
          DB_NAME: krateo-db
          DB_READY_TIMEOUT: "5m"

          AUTHN_NS: "{{ .Namespace }}"

        dbSecret:
          name: krateo-db
        
        jwtSignKeySecret:
          name: jwt-sign-key

  - id: install-events-ingester
    type: chart
    with:
      releaseName: events-ingester
      repo: events-ingester
      url: https://charts.krateo.io
      version: 0.4.0
      values:        
        config:
          DEBUG: "true"
          PORT: "8082"

          DB_HOST: pg-cluster-rw.{{ .Namespace }}.svc.cluster.local
          DB_NAME: krateo-db
          DB_READY_TIMEOUT: "5m"
        
        secret:
          name: krateo-db

  - id: install-events-presenter
    type: chart
    with:
      releaseName: events-presenter
      repo: events-presenter
      url: https://charts.krateo.io
      version: 0.6.7
      wait: true
      timeout: 15m
      values:
        service:
          type: LoadBalancer
        config:
          DEBUG: "true"
          PORT: "8083"

          DB_HOST: pg-cluster-rw.{{ .Namespace }}.svc.cluster.local
          DB_NAME: krateo-db
          DB_READY_TIMEOUT: "5m"
        
        secret:
          name: krateo-db

  # Extract events-presenter LoadBalancer IP
  - id: extract-events-presenter-lb-ip
    type: var
    with:
      name: EVENTSSE_IP
      valueFrom:
        apiVersion: v1
        kind: Service
        metadata:
          name: events-presenter
          namespace: {{ .Namespace }}
        selector: .status.loadBalancer.ingress[0].ip

  # Extract events-presenter port
  - id: extract-events-presenter-lb-port
    type: var
    with:
      name: EVENTSSE_PORT # Legacy name
      valueFrom:
        apiVersion: v1
        kind: Service
        metadata:
          name: events-presenter
          namespace: {{ .Namespace }}
        selector: .spec.ports[0].port

  # Frontend UI
  - id: install-frontend
    type: chart
    with:
      releaseName: frontend
      repo: frontend
      url: https://charts.krateo.io
      version: 1.0.15
      wait: true
      timeout: 15m
      values:
        image:
          repository: ghcr.io/krateoplatformops/frontend
          pullPolicy: IfNotPresent
        service:
          type: LoadBalancer
        config:
          AUTHN_API_BASE_URL: http://${AUTHN_IP}:${AUTHN_PORT}
          SNOWPLOW_API_BASE_URL: http://${SNOWPLOW_IP}:${SNOWPLOW_PORT}
          EVENTS_PUSH_API_BASE_URL: http://${EVENTSSE_IP}:${EVENTSSE_PORT}
          EVENTS_API_BASE_URL: http://${EVENTSSE_IP}:${EVENTSSE_PORT}
          INIT: /call?resource=navmenus&apiVersion=widgets.templates.krateo.io/v1beta1&name=sidebar-nav-menu&namespace={{ .Namespace }}
          ROUTES_LOADER: /call?resource=routesloaders&apiVersion=widgets.templates.krateo.io/v1beta1&name=routes-loader&namespace={{ .Namespace }}

  # Portal starter
  - id: install-portal
    type: chart
    with:
      releaseName: portal
      repo: portal
      url: https://marketplace.krateo.io
      version: 1.3.3

  # Core composition engine
  - id: install-core-provider
    type: chart
    with:
      releaseName: core-provider
      repo: core-provider
      url: https://charts.krateo.io
      version: 1.0.0-rc2
      values:
        image:
          repository: ghcr.io/krateoplatformops/core-provider
          pullPolicy: IfNotPresent
          tag: 1.0.0-rc3
        cdc:
          image:
            repository: ghcr.io/krateoplatformops/composition-dynamic-controller
            pullPolicy: IfNotPresent
            tag: 1.0.0-rc4
        chartInspector:
          image:
            repository: ghcr.io/krateoplatformops/chart-inspector
            pullPolicy: IfNotPresent
            tag: 0.2.0 #Bug nella 1.0.0-rc1 di chart-inspector da risolvere

  # OAS provider for operator generation from OpenAPI specs
  - id: install-oasgen-provider
    type: chart
    with:
      releaseName: oasgen-provider
      repo: oasgen-provider
      url: https://charts.krateo.io
      version: 0.11.1
      values:
        image:
          repository: ghcr.io/krateoplatformops/oasgen-provider
          pullPolicy: IfNotPresent
        rdc:
          image:
            repository: ghcr.io/krateoplatformops/rest-dynamic-controller
            pullPolicy: IfNotPresent

  # ============================================================================
  # FINOPS - Optional cost management module
  # Can be disabled by removing these steps or setting enabled: false on them
  # ============================================================================

  # FinOps database backend
  - id: install-finops-cratedb
    type: chart
    with:
      releaseName: cratedb
      repo: cratedb
      url: https://charts.krateo.io
      version: 0.1.4
      values:
        image:
          repository: ghcr.io/krateoplatformops/crate
          pullPolicy: IfNotPresent
        openshift:
          enabled: false

  # FinOps exporter
  - id: install-finops-operator-exporter
    type: chart
    with:
      releaseName: finops-operator-exporter
      repo: finops-operator-exporter
      url: https://charts.krateo.io
      version: 0.5.2
      wait: true
      timeout: 15m
      values:
        image:
          repository: ghcr.io/krateoplatformops/finops-operator-exporter
          pullPolicy: IfNotPresent

  # FinOps cost analyzer
  - id: install-finops-operator-focus
    type: chart
    with:
      releaseName: finops-operator-focus
      repo: finops-operator-focus
      url: https://charts.krateo.io
      version: 0.4.3
      wait: true
      timeout: 15m
      values:
        image:
          repository: ghcr.io/krateoplatformops/finops-operator-focus
          pullPolicy: IfNotPresent

  # FinOps database handler (LoadBalancer-exposed for cloud platforms)
  - id: install-finops-database-handler
    type: chart
    with:
      releaseName: finops-database-handler
      repo: finops-database-handler
      url: https://charts.krateo.io
      version: 0.5.3
      wait: true
      timeout: 15m
      values:
        image:
          repository: ghcr.io/krateoplatformops/finops-database-handler
          pullPolicy: IfNotPresent
        service:
          type: LoadBalancer
        env:
          CRATE_HOST: cratedb.{{ .Namespace }}.svc.cluster.local
          cratedbUserSystemName: cratedb-system-credentials

  # Extract finops database handler port
  - id: extract-finops-database-handler-port
    type: var
    with:
      name: FINOPS_DATABASE_HANDLER_INTERNAL_PORT
      valueFrom:
        apiVersion: v1
        kind: Service
        metadata:
          name: finops-database-handler
          namespace: {{ .Namespace }}
        selector: .spec.ports[0].port

  # FinOps database uploader
  - id: install-finops-database-handler-uploader
    type: chart
    with:
      releaseName: finops-database-handler-uploader
      repo: finops-database-handler-uploader
      url: https://charts.krateo.io
      version: 0.2.1
      values:
        image:
          repository: ghcr.io/krateoplatformops/finops-database-handler-uploader
          pullPolicy: IfNotPresent
        env:
          FINOPS_DATABASE_HANDLER_ENDPOINT_NAME: finops-database-handler-endpoint
          FINOPS_DATABASE_HANDLER_ENDPOINT_NAMESPACE: {{ .Namespace }}
          DATABASE_CONFIG_NAMESPACE: {{ .Namespace }}

  # FinOps notebooks
  - id: install-finops-notebooks
    type: chart
    with:
      releaseName: finops-notebooks
      repo: finops-notebooks
      url: https://charts.krateo.io
      version: 0.1.1

  # FinOps scraper
  - id: install-finops-operator-scraper
    type: chart
    with:
      releaseName: finops-operator-scraper
      repo: finops-operator-scraper
      url: https://charts.krateo.io
      version: 0.5.0
      values:
        image:
          repository: ghcr.io/krateoplatformops/finops-operator-scraper
          pullPolicy: IfNotPresent
        env:
          URL_DB_WEBSERVICE: http://finops-database-handler.{{ .Namespace }}.svc.cluster.local:${FINOPS_DATABASE_HANDLER_INTERNAL_PORT}

  # Policy Engine
  - id: install-opa
    type: chart
    with:
      releaseName: opa-kube-mgmt
      repo: opa-kube-mgmt
      url: https://charts.krateo.io
      version: 0.2.3
      values:
        image:
          repository: ghcr.io/krateoplatformops/opa
          pullPolicy: IfNotPresent
          tag: 1.4.2-static
