name: Validate Krateo Versions Consistency

permissions:
  issues: write          
  pull-requests: write   
  contents: read        

on:
  pull_request:
    paths:
      - 'krateo*.yaml'
  push:
    branches:
      - main
    paths:
      - 'krateo*.yaml'

jobs:
  validate-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate chart versions consistency
        run: python3 scripts/validate-config.py

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Configuration consistency check failed. Please ensure all krateo*.yaml files have matching chart versions, repositories, URLs, release names, and container image tags. See workflow logs for details.'
            })
