name: Validate ArgoCD Jobs & Release

on:
  pull_request:
    paths:
      - 'gitops-examples/argocd/**'
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
    paths:
      - 'gitops-examples/argocd/**'

jobs:
  validate-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Job Version Consistency
        run: |
          v_ingress=$(awk '/- --version/{getline; print $2}' gitops-examples/argocd/ingress/job.yaml | tr -d '"')
          v_loadb=$(awk '/- --version/{getline; print $2}' gitops-examples/argocd/loadbalancer/job.yaml | tr -d '"')
          v_nodeport=$(awk '/- --version/{getline; print $2}' gitops-examples/argocd/nodeport/job.yaml | tr -d '"')

          if [[ "$v_ingress" != "$v_loadb" || "$v_loadb" != "$v_nodeport" ]]; then
            echo "❌ --version mismatches between job manifests."
            echo "   ingress:      $v_ingress"
            echo "   loadbalancer: $v_loadb"
            echo "   nodeport:     $v_nodeport"
            exit 1
          fi
          echo "✅ All ArgoCD job manifests are consistent: $v_ingress"

      - name: Validate Tag Match
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # Consistency check already passed, so we can use ingress as reference
          JOB_VERSION=$(awk '/- --version/{getline; print $2}' gitops-examples/argocd/ingress/job.yaml | tr -d '"')
          
          if [[ "$TAG_NAME" != "$JOB_VERSION" ]]; then
            echo "❌ Release Tag mismatch!"
            echo "   Tag Name: $TAG_NAME"
            echo "   Job Version: $JOB_VERSION"
            exit 1
          fi
          echo "✅ Tag matches Job Version."
