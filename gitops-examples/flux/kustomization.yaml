apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: krateoctl-install-__INSTALL_TYPE__
  namespace: flux-system
spec:
  interval: 5m
  wait: true
  prune: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: krateo-gitops
  path: __GITOPS_PATH__
  targetNamespace: krateo-system
