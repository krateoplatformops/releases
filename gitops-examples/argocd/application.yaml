apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: krateoctl-install-__INSTALL_TYPE__
  namespace: argocd
spec:
  project: default
  source:
    repoURL: __GITOPS_REPO_URL__
    targetRevision: main
    path: __GITOPS_PATH__
  destination:
    server: https://kubernetes.default.svc
    namespace: krateo-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
