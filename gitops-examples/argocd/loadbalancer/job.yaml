apiVersion: v1
kind: ServiceAccount
metadata:
  name: krateoctl-install
  namespace: krateo-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: krateoctl-install
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: krateoctl-install
    namespace: krateo-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: krateoctl-install-loadbalancer
  labels:
    app.kubernetes.io/name: krateoctl-install
    krateo.io/install-type: loadbalancer
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  manualSelector: true
  selector:
    matchLabels:
      app.kubernetes.io/name: krateoctl-install
      krateo.io/install-type: loadbalancer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krateoctl-install
        krateo.io/install-type: loadbalancer
    spec:
      serviceAccountName: krateoctl-install
      restartPolicy: Never
      containers:
        - name: krateoctl
          image: ghcr.io/krateoplatformops/krateoctl:1.2.1
          imagePullPolicy: IfNotPresent
          args:
            - install
            - apply
            - --version
            - "3.1.0-rc1-dev2"
            - --repository
            - "https://github.com/krateoplatformops/releases"
            - --namespace
            - "krateo-system"
            - --type
            - "loadbalancer"