# This profile disables the cnpg component.
# It can be used in those cases where an exiting or remote PostgreSQL database 
# is used instead of the one provided shipped with standard Krateo installation.
# Note: you still need to provide, with a config file for krateoctl, the correct database credentials and connection details to the following components:
# - deviser
# - resources-ingester
# - resources-presenter
# - events-ingester
# - events-presenter

components:
  cnpg:
    enabled: false
