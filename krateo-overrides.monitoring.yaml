components:
  db-maintenance:
    stepConfig:
      install-deviser:
        with:
          values:
            config:
              OTEL_ENABLED: "true"
              OTEL_EXPORT_INTERVAL: "30s"
              OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
