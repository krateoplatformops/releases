apiVersion: v1
kind: ServiceAccount
metadata:
  name: krateoctl-install
  namespace: krateo-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: krateoctl-install
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: krateoctl-install
    namespace: krateo-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: krateoctl-install-ingress
  labels:
    app.kubernetes.io/name: krateoctl-install
    app.kubernetes.io/version: argo-job-testing
    krateo.io/install-type: ingress
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  manualSelector: true
  selector:
    matchLabels:
      app.kubernetes.io/name: krateoctl-install
      krateo.io/install-type: ingress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krateoctl-install
        app.kubernetes.io/version: argo-job-testing
        krateo.io/install-type: ingress
    spec:
      serviceAccountName: krateoctl-install
      restartPolicy: Never
      containers:
        - name: krateoctl
          image: ghcr.io/krateoplatformops/krateoctl:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KUBECONFIG
              value: /kubeconfig/config
          args:
            - install
            - apply
            - --version
            - "argo-job-testing"
            - --repository
            - "https://github.com/krateoplatformops/releases"
            - --namespace
            - "krateo-system"
            - --type
            - "ingress"
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
      volumes:
        - name: kubeconfig
          secret:
            secretName: krateoctl-kubeconfig
            items:
              - key: config
                path: config
