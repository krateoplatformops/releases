apiVersion: v1
kind: ConfigMap
metadata:
  name: krateoctl-install-config-__SET_RELEASE_TAG__
  labels:
    app.kubernetes.io/name: krateoctl-install
    app.kubernetes.io/version: __SET_RELEASE_TAG__
    krateo.io/install-type: loadbalancer
data:
  KRATEOCTL_VERSION: "__SET_RELEASE_TAG__"
  KRATEOCTL_REPOSITORY: "https://github.com/krateoplatformops/releases"
  KRATEOCTL_NAMESPACE: "krateo-system"
  KRATEOCTL_TYPE: "loadbalancer"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: krateoctl-install-__SET_RELEASE_TAG__-loadbalancer
  labels:
    app.kubernetes.io/name: krateoctl-install
    app.kubernetes.io/version: __SET_RELEASE_TAG__
    krateo.io/install-type: loadbalancer
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krateoctl-install
        app.kubernetes.io/version: __SET_RELEASE_TAG__
        krateo.io/install-type: loadbalancer
    spec:
      serviceAccountName: krateoctl-install
      restartPolicy: Never
      containers:
        - name: krateoctl
          image: ghcr.io/krateoplatformops/krateoctl:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: krateoctl-install-config-__SET_RELEASE_TAG__
          command:
            - /bin/sh
            - -ec
            - |
              : "${KRATEOCTL_VERSION:?missing KRATEOCTL_VERSION}"
              : "${KRATEOCTL_REPOSITORY:?missing KRATEOCTL_REPOSITORY}"
              : "${KRATEOCTL_NAMESPACE:?missing KRATEOCTL_NAMESPACE}"
              : "${KRATEOCTL_TYPE:?missing KRATEOCTL_TYPE}"

              exec krateoctl install apply \
                --version "${KRATEOCTL_VERSION}" \
                --repository "${KRATEOCTL_REPOSITORY}" \
                --namespace "${KRATEOCTL_NAMESPACE}" \
                --type "${KRATEOCTL_TYPE}"
