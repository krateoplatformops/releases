components:
  finops:
    stepConfig:
      install-finops-cratedb:
        with:
          values:
            openshift:
              enabled: true
  cnpg:
    stepConfig:
      install-cnpg:
        with:
          values:
            containerSecurityContext:
              runAsUser: null
              runAsGroup: null
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              seccompProfile:
                type: RuntimeDefault
              capabilities:
                drop:
                  - "ALL"
