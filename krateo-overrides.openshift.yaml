# Krateo release profile.
# This file defines the OpenShift override profile for Krateo releases.
# Use with krateoctl plan/apply.
# It switches FinOps and CNPG settings to OpenShift-compatible security defaults.
components:
  finops:
    stepConfig:
      install-finops-cratedb:
        with:
          values:
            openshift:
              enabled: true
  cnpg:
    stepConfig:
      install-cnpg:
        with:
          values:
            containerSecurityContext:
              runAsUser: null
              runAsGroup: null
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              seccompProfile:
                type: RuntimeDefault
              capabilities:
                drop:
                  - "ALL"
